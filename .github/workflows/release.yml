name: release

# Publish a GitHub Release whenever a v* tag is pushed. The prebuilt patcher
# (committed under patcher/prebuilt/, reproducible) is attached as a download.
# Uses the repo's built-in token — no external secrets needed.
#
# SetupUtilityApp.efi is Lenovo's copyrighted binary and is deliberately NOT
# attached; users extract it from their own firmware with
# scripts/extract-from-bios.sh (see RELEASE_NOTES.md).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify prebuilt is present
        run: |
          test -f patcher/prebuilt/BiosAdvancedPatch.efi
          sha256sum patcher/prebuilt/BiosAdvancedPatch.efi

      - name: Create / update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="BiosAdvancedPatch ${TAG} — ThinkBook Advanced menu (NLCN37/38/39)"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" patcher/prebuilt/BiosAdvancedPatch.efi --clobber
            gh release edit  "$TAG" --title "$TITLE" --notes-file RELEASE_NOTES.md
          else
            gh release create "$TAG" patcher/prebuilt/BiosAdvancedPatch.efi \
              --title "$TITLE" --notes-file RELEASE_NOTES.md
          fi
